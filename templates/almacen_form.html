{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<style>
    /* ==========================================
       ESTILOS PERSONALIZADOS (MODO CLARO/OSCURO)
       ========================================== */
       
    /* --- AJUSTES GLOBALES PARA LA BARRA DE NAVEGACIÓN --- */
    [data-bs-theme="dark"] .navbar {
        background-color: #121212 !important;
        border-bottom: 1px solid #2a2a2a !important;
    }
    [data-bs-theme="dark"] .navbar .navbar-brand,
    [data-bs-theme="dark"] .navbar .nav-link,
    [data-bs-theme="dark"] .navbar .navbar-text {
        color: #e0e0e0 !important;
    }
    [data-bs-theme="dark"] .navbar .nav-link:hover {
        color: #ffffff !important;
    }

    /* --- AJUSTES PARA MODO OSCURO (Pure Black) --- */
    [data-bs-theme="dark"] body {
        background-color: #000000 !important;
        color: #e0e0e0;
    }
    [data-bs-theme="dark"] .card {
        background-color: #121212 !important;
        border-color: #2a2a2a !important;
    }
    [data-bs-theme="dark"] .card-header {
        background-color: transparent !important;
        border-bottom-color: #2a2a2a !important;
    }
    [data-bs-theme="dark"] .bg-light {
        background-color: #1a1a1a !important;
    }
    [data-bs-theme="dark"] .text-dark {
        color: #ffffff !important;
    }
    [data-bs-theme="dark"] .text-muted {
        color: #888888 !important;
    }
    [data-bs-theme="dark"] .border-secondary {
        border-color: #2a2a2a !important;
    }
    
    /* Inputs y Formularios en Modo Oscuro */
    [data-bs-theme="dark"] .form-control,
    [data-bs-theme="dark"] .input-group-text {
        background-color: #1a1a1a !important;
        border-color: #333 !important;
        color: #e0e0e0 !important;
    }
    [data-bs-theme="dark"] .form-control:focus {
        background-color: #222 !important;
        border-color: #0d6efd !important;
        color: #fff !important;
    }

    /* --- AJUSTES PARA MODO CLARO --- */
    [data-bs-theme="light"] body {
        background-color: #f8f9fa !important;
        color: #212529;
    }
    [data-bs-theme="light"] .card {
        background-color: #ffffff;
        border-color: #dee2e6;
    }

    /* ==========================================
       ANIMACIÓN DEL BOTÓN DE TEMA (SOL / LUNA)
       ========================================== */
    .theme-switch-wrapper {
        position: relative;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        border: 1px solid #dee2e6;
        transition: background-color 0.3s ease, border-color 0.3s ease, transform 0.2s ease;
        overflow: hidden;
    }
    .theme-switch-wrapper:hover {
        transform: scale(1.08);
        box-shadow: 0 4px 8px rgba(0,0,0,0.1) !important;
    }
    .theme-switch-icon {
        position: absolute;
        font-size: 1.3rem;
        transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.4s ease;
    }
    /* Estado inicial: MODO CLARO */
    .theme-switch-sun {
        color: #ffc107;
        transform: translateY(0) rotate(0deg);
        opacity: 1;
    }
    .theme-switch-moon {
        color: #e0e0e0;
        transform: translateY(30px) rotate(90deg);
        opacity: 0;
    }
    
    /* Estado: MODO OSCURO */
    [data-bs-theme="dark"] .theme-switch-wrapper {
        background-color: #1a1a1a;
        border-color: #333;
    }
    [data-bs-theme="dark"] .theme-switch-wrapper:hover {
        box-shadow: 0 4px 8px rgba(255,255,255,0.05) !important;
    }
    [data-bs-theme="dark"] .theme-switch-sun {
        transform: translateY(-30px) rotate(-90deg);
        opacity: 0;
    }
    [data-bs-theme="dark"] .theme-switch-moon {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
    }
</style>

<div class="container-fluid mt-3 mb-5">

    <!-- BOTÓN DE TEMA ANIMADO (SOL/LUNA) -->
    <div class="d-flex justify-content-end mb-2">
        <div id="theme-toggle" class="theme-switch-wrapper shadow-sm" title="Alternar Tema Claro/Oscuro">
            <i class="bi bi-sun-fill theme-switch-icon theme-switch-sun"></i>
            <i class="bi bi-moon-stars-fill theme-switch-icon theme-switch-moon"></i>
        </div>
    </div>

    <!-- ENCABEZADO -->
    <div class="text-center mb-5">
        <h2 class="fw-bold fs-1"><i class="bi bi-shop text-primary me-2"></i>{{ titulo }}</h2>
        <p class="text-muted fs-5">
            Gestiona los detalles físicos de tu espacio de inventario
        </p>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-8">
            
            <!-- TARJETA DEL FORMULARIO -->
            <div class="card shadow-sm border-0 rounded-4">
                <div class="card-header bg-transparent pt-4 pb-3 border-bottom border-secondary border-opacity-25">
                    <h4 class="mb-0 fw-bold text-body"><i class="bi bi-info-circle text-primary me-2"></i>Información del Almacén</h4>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form method="POST" action="{{ url_for('editar_almacen', id=almacen.id) if almacen else url_for('nuevo_almacen') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                        
                        <div class="row g-4">
                            <!-- CAMPO: Nombre -->
                            <div class="col-md-6">
                                <label for="nombre" class="form-label fw-bold small text-muted">Nombre del Almacén</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-secondary border-opacity-25"><i class="bi bi-building text-secondary"></i></span>
                                    <input type="text" class="form-control bg-light border-secondary border-opacity-25" id="nombre" name="nombre" 
                                           value="{{ almacen.nombre if almacen else '' }}" placeholder="Ej: Bodega Principal, Tienda" required>
                                </div>
                            </div>
                            
                            <!-- CAMPO: Ubicación -->
                            <div class="col-md-6">
                                <label for="ubicacion" class="form-label fw-bold small text-muted">Ubicación / Referencia (Opcional)</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-secondary border-opacity-25"><i class="bi bi-pin-map text-secondary"></i></span>
                                    <input type="text" class="form-control bg-light border-secondary border-opacity-25" id="ubicacion" name="ubicacion" 
                                           value="{{ almacen.ubicacion if almacen else '' }}" placeholder="Ej: Pasillo A, Estante 1">
                                </div>
                            </div>
                            
                            <!-- SEPARADOR Y BOTONES -->
                            <div class="col-12 mt-5">
                                <hr class="border-secondary border-opacity-25 mb-4">
                                <div class="d-grid gap-3 d-md-flex justify-content-md-end">
                                    <a href="{{ url_for('lista_almacenes') }}" class="btn btn-outline-secondary rounded-pill fw-bold px-4 py-2">
                                        Cancelar
                                    </a>
                                    <button type="submit" class="btn btn-primary rounded-pill fw-bold shadow-sm px-4 py-2">
                                        <i class="bi bi-save me-2"></i> Guardar Almacén
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- SCRIPT DEL TEMA OSCURO/CLARO -->
<script>
    const themeToggleBtn = document.getElementById('theme-toggle');
    const htmlElement = document.documentElement;

    function applyTheme(theme) {
        htmlElement.setAttribute('data-bs-theme', theme);
        localStorage.setItem('app_theme', theme);
    }

    // Inicializar Tema (Cargar desde memoria o establecer Dark por defecto)
    const savedTheme = localStorage.getItem('app_theme') || 'dark';
    applyTheme(savedTheme);

    // Evento del Botón
    if(themeToggleBtn) {
        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-bs-theme');
            applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });
    }
</script>
{% endblock %}
