{% extends 'base.html' %}
{% block title %}Acceso denegado{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height:60vh; padding:3rem 1rem;">
    <div style="font-size:6rem; line-height:1; margin-bottom:1.5rem; opacity:0.15; font-weight:900; letter-spacing:-4px; color:#f59e0b;">403</div>
    <div style="margin-bottom:1rem;"><i class="bi bi-shield-lock-fill" style="font-size:3rem;color:#f59e0b;opacity:.4;"></i></div>
    <h2 class="fw-bold mb-2">Acceso denegado</h2>
    <p class="text-muted mb-4" style="max-width:380px; font-size:0.95rem;">
        No tienes permisos para acceder a esta sección. Contacta a tu administrador si crees que esto es un error.
    </p>
    <div class="d-flex gap-3 flex-wrap justify-content-center">
        <a href="{{ url_for('main.index') }}" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
            <i class="bi bi-house me-1"></i> Ir al Inicio
        </a>
        <button onclick="history.back()" class="btn btn-outline-secondary rounded-pill px-4 fw-bold">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </button>
    </div>
</div>
{% endblock %}
