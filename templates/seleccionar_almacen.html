{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
    <div class="page-header mb-4">
        <div class="page-header-row">
            <div>
                <h1 class="page-title">{{ titulo }}</h1>
                <p class="page-subtitle">Por favor, selecciona un almacén para continuar.</p>
            </div>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <div class="card">
                <div class="card-body">
                    <form id="formSeleccionarAlmacen" method="GET" action="{{ url_for(destino_ruta) }}">
                        <div class="mb-3">
                            <label for="almacen_id" class="form-label">Almacenes Disponibles</label>
                            <select class="form-select" id="almacen_id" name="almacen_id" required>
                                <option value="">-- Selecciona un almacén --</option>
                                {% for alm in almacenes %}
                                    <option value="{{ alm.id }}">{{ alm.nombre }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary">Continuar</button>
                        <a href="{{ url_for('main.index') }}" class="btn btn-secondary">Cancelar</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('formSeleccionarAlmacen').addEventListener('submit',function(){const btn=this.querySelector('[type="submit"]');if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Cargando…';}});
</script>
{% endblock %}
