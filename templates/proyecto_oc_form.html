{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
<style>
    /* Estilos Premium y Animaciones */
    [data-bs-theme="dark"] .card {
        background-color: #111827 !important;
        border-color: rgba(255,255,255,0.08) !important;
    }
    .item-row {
        transition: all 0.3s ease;
        border-left: 6px solid #6366f1;
        position: relative;
    }
    .ai-loading {
        animation: pulse 1.5s infinite;
        opacity: 0.6;
    }
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    .search-container { position: relative; }
    #lista_sugerencias {
        z-index: 1050;
        max-height: 300px;
        overflow-y: auto;
    }
    .btn-ai {
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        color: white;
        border: none;
    }
    .btn-ai:hover {
        filter: brightness(1.1);
        color: white;
    }
</style>

<div class="container-fluid mt-3 mb-5">
    <!-- ENCABEZADO -->
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <div>
            <h2 class="fw-bold mb-1"><i class="bi bi-cpu-fill text-primary me-2"></i>{{ titulo }} <span class="badge bg-info ms-2 fs-6 fw-normal">AI Enhanced</span></h2>
            <p class="text-muted mb-0">Usa el buscador o deja que la IA complete los detalles técnicos de tus pedidos.</p>
        </div>
        <a href="{{ url_for('lista_proyectos_oc') }}" class="btn btn-outline-secondary rounded-pill px-4 fw-bold shadow-sm">
            <i class="bi bi-arrow-left me-1"></i> Volver
        </a>
    </div>

    <form method="POST" id="form_proyecto_oc" action="{{ url_for('editar_proyecto_oc', id=proyecto_oc.id) if proyecto_oc else url_for('nuevo_proyecto_oc') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="row g-4">
            <!-- COLUMNA IZQUIERDA -->
            <div class="col-xl-4">
                <div class="card shadow-sm border-0 rounded-4 sticky-top" style="top: 20px;">
                    <div class="card-body p-4">
                        <div class="mb-4">
                            <label for="nombre_proyecto" class="form-label small fw-bold text-muted text-uppercase">Nombre del Proyecto</label>
                            <input type="text" name="nombre_proyecto" id="nombre_proyecto" class="form-control form-control-lg shadow-sm border-0 bg-light" 
                                   placeholder="Ej: Reforma Planta 3" required 
                                   value="{{ proyecto_oc.nombre_proyecto if proyecto_oc else '' }}">
                        </div>

                        <hr class="my-4 opacity-10">

                        <div class="search-container mb-3">
                            <label class="form-label small fw-bold text-muted text-uppercase">Buscador de Catálogo</label>
                            <div class="input-group shadow-sm">
                                <span class="input-group-text bg-white border-end-0"><i class="bi bi-search text-primary"></i></span>
                                <input type="text" id="buscador_productos" class="form-control border-start-0 ps-0" placeholder="SKU o Nombre...">
                            </div>
                            <div id="lista_sugerencias" class="list-group position-absolute w-100 shadow-lg mt-1" style="display: none;"></div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="button" id="btn_manual" class="btn btn-outline-primary fw-bold rounded-pill">
                                <i class="bi bi-plus-circle me-2"></i> Añadir Item Manual
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- COLUMNA DERECHA -->
            <div class="col-xl-8">
                <div class="card shadow-sm border-0 rounded-4">
                    <div class="card-header bg-transparent pt-4 d-flex justify-content-between align-items-center border-0">
                        <h5 class="fw-bold mb-0">Lista de Materiales</h5>
                        <div id="ai_status" class="small text-muted d-none">
                            <span class="spinner-border spinner-border-sm text-primary me-2"></span> IA Analizando...
                        </div>
                    </div>
                    
                    <div class="card-body p-4">
                        <div id="contenedor_items">
                            <div id="mensaje_vacio" class="text-center py-5 text-muted opacity-50">
                                <i class="bi bi-magic fs-1 mb-3"></i>
                                <p>Agrega artículos para comenzar.</p>
                            </div>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-pill shadow">
                                <i class="bi bi-check-all me-2"></i> Guardar Todo
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </form>
</div>

<!-- PLANTILLA DE ITEM -->
<template id="plantilla_item">
    <div class="item-row card mb-3 border-0 bg-light shadow-sm">
        <div class="card-body p-3">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label small fw-bold text-muted">Artículo</label>
                    <div class="input-group">
                        <input type="hidden" name="producto_id[]" class="item-id">
                        <input type="text" name="descripcion_nuevo[]" class="form-control border-0 fw-bold bg-white item-nombre" placeholder="Nombre del artículo..." required>
                        <button type="button" class="btn btn-ai btn-sm btn-magic-ai" title="Completar con IA">
                            <i class="bi bi-magic"></i>
                        </button>
                    </div>
                    <small class="text-primary fw-bold item-sku-label" style="font-size: 0.7rem;"></small>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Cantidad</label>
                    <input type="number" name="cantidad_solicitada[]" class="form-control border-0 text-center bg-white item-cantidad" value="1" min="1">
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-bold text-muted">Costo Est. ($)</label>
                    <input type="number" name="costo_unitario_estimado[]" class="form-control border-0 text-end bg-white item-costo" step="0.01" value="0.00">
                </div>
                <div class="col-md-1 d-flex align-items-end justify-content-end">
                    <button type="button" class="btn btn-link text-danger p-0 btn-eliminar-fila">
                        <i class="bi bi-trash3 fs-5"></i>
                    </button>
                </div>
                
                <div class="col-12 mt-2">
                    <div class="row g-2">
                        <div class="col-md-6">
                            <input type="url" name="enlace_proveedor[]" class="form-control form-control-sm border-0 bg-white item-enlace" placeholder="Link de referencia">
                        </div>
                        <div class="col-md-6">
                            <textarea name="comentarios_detalle[]" class="form-control form-control-sm border-0 bg-white item-comentarios" rows="1" placeholder="Especificaciones o notas..."></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</template>

<script>
    // CONFIGURACIÓN API GEMINI
    const apiKey = ""; // El entorno inyectará la clave automáticamente
    const productosBase = {{ productos | tojson | safe }};
    const contenedor = document.getElementById('contenedor_items');
    const msgVacio = document.getElementById('mensaje_vacio');
    const buscador = document.getElementById('buscador_productos');
    const sugerencias = document.getElementById('lista_sugerencias');

    // Función de ayuda para llamar a Gemini con Backoff
    async function llamarGemini(prompt, retries = 5, delay = 1000) {
        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${AQ.Ab8RN6KCkeKmd3Ut3Kh8VKjYrZmBJu-DjfnhIuyVPeACdT4TLA}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { responseMimeType: "application/json", 
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            especificaciones: { type: "STRING" },
                            costo_estimado: { type: "NUMBER" }
                        }
                    }}
                })
            });
            const data = await response.json();
            return JSON.parse(data.candidates[0].content.parts[0].text);
        } catch (error) {
            if (retries > 0) {
                await new Promise(res => setTimeout(res, delay));
                return llamarGemini(prompt, retries - 1, delay * 2);
            }
            throw error;
        }
    }

    function agregarFila(datos) {
        if(msgVacio) msgVacio.style.display = 'none';
        const plantilla = document.getElementById('plantilla_item');
        const clon = plantilla.content.cloneNode(true);
        const row = clon.querySelector('.item-row');

        row.querySelector('.item-id').value = datos.id || '0';
        const inputNombre = row.querySelector('.item-nombre');
        inputNombre.value = datos.nombre || '';
        
        if (datos.id && datos.id != '0') {
            inputNombre.readOnly = true;
            row.querySelector('.item-sku-label').innerText = `CATÁLOGO: ${datos.codigo}`;
            row.querySelector('.btn-magic-ai').style.display = 'none';
        } else {
            row.querySelector('.item-sku-label').innerText = 'MANUAL / AI ASSISTED';
        }

        row.querySelector('.item-cantidad').value = datos.cantidad || 1;
        row.querySelector('.item-costo').value = datos.costo || 0;
        row.querySelector('.item-enlace').value = datos.enlace || '';
        row.querySelector('.item-comentarios').value = datos.comentarios || '';

        // EVENTO MÁGICO (AI)
        row.querySelector('.btn-magic-ai').onclick = async function() {
            const nombre = inputNombre.value;
            if (!nombre) return;
            
            this.disabled = true;
            this.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';
            row.classList.add('ai-loading');

            try {
                const res = await llamarGemini(`Genera especificaciones técnicas breves y un costo estimado en USD para: ${nombre}. Responde solo en JSON.`);
                row.querySelector('.item-comentarios').value = res.especificaciones;
                if (parseFloat(row.querySelector('.item-costo').value) === 0) {
                    row.querySelector('.item-costo').value = res.costo_estimado;
                }
            } catch (err) {
                console.error("Error IA:", err);
            } finally {
                this.disabled = false;
                this.innerHTML = '<i class="bi bi-magic"></i>';
                row.classList.remove('ai-loading');
            }
        };

        row.querySelector('.btn-eliminar-fila').onclick = () => {
            row.remove();
            if (contenedor.querySelectorAll('.item-row').length === 0) msgVacio.style.display = 'block';
            actualizarContador();
        };

        contenedor.appendChild(row);
        actualizarContador();
    }

    function actualizarContador() {
        const n = contenedor.querySelectorAll('.item-row').length;
        document.getElementById('contador_items').innerText = `${n} Items`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Carga de edición
        {% if proyecto_oc %}
            {% for d in proyecto_oc.detalles %}
            agregarFila({
                id: "{{ d.producto_id or '0' }}",
                nombre: "{{ d.producto.nombre if d.producto else d.descripcion_nuevo }}",
                codigo: "{{ d.producto.codigo if d.producto else '' }}",
                cantidad: "{{ d.cantidad_solicitada }}",
                costo: "{{ d.costo_unitario_estimado }}",
                enlace: "{{ d.enlace_proveedor or '' }}",
                comentarios: "{{ d.comentarios_detalle or '' }}"
            });
            {% endfor %}
        {% endif %}

        buscador.addEventListener('input', function() {
            const q = this.value.toLowerCase().trim();
            sugerencias.innerHTML = '';
            if (q.length < 2) { sugerencias.style.display = 'none'; return; }
            const matches = productosBase.filter(p => p.nombre.toLowerCase().includes(q) || p.codigo.toLowerCase().includes(q)).slice(0, 5);
            if (matches.length) {
                sugerencias.style.display = 'block';
                matches.forEach(p => {
                    const a = document.createElement('a');
                    a.className = 'list-group-item list-group-item-action py-3';
                    a.innerHTML = `<strong>${p.nombre}</strong> <small class="text-muted d-block">${p.codigo}</small>`;
                    a.onclick = () => {
                        agregarFila({ id: p.id, nombre: p.nombre, codigo: p.codigo, costo: p.precio_unitario || 0 });
                        buscador.value = '';
                        sugerencias.style.display = 'none';
                    };
                    sugerencias.appendChild(a);
                });
            } else { sugerencias.style.display = 'none'; }
        });

        document.getElementById('btn_manual').onclick = () => agregarFila({ id: 0, nombre: '' });
    });
</script>
{% endblock %}
