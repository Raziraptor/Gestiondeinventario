<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sin conexión — Gestor de Inventario</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --text: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
            --surface: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --text: #f1f5f9;
                --muted: #94a3b8;
                --border: #1e293b;
                --surface: #1e293b;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .icon-wrap {
            width: 96px; height: 96px; border-radius: 50%;
            background: rgba(79,70,229,.12);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        svg { width: 48px; height: 48px; }
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .5rem; }
        p  { color: var(--muted); font-size: 1rem; line-height: 1.6; max-width: 380px; margin: 0 auto 2rem; }
        .btn {
            display: inline-flex; align-items: center; gap: .5rem;
            background: var(--primary); color: #fff;
            padding: .75rem 2rem; border-radius: 9999px;
            font-weight: 600; font-size: .95rem;
            border: none; cursor: pointer; text-decoration: none;
            transition: opacity .15s;
        }
        .btn:hover { opacity: .88; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ef4444;
            display: inline-block; margin-right: .4rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .badge {
            display: inline-flex; align-items: center;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 9999px; padding: .35rem .9rem;
            font-size: .8rem; color: var(--muted); margin-bottom: 1.5rem;
        }
        footer { margin-top: 3rem; color: var(--muted); font-size: .75rem; }
        @keyframes pulse {
            0%, 100% { opacity: 1; } 50% { opacity: .4; }
        }
    </style>
</head>
<body>
    <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#4f46e5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <circle cx="12" cy="20" r="1" fill="#4f46e5" stroke="none"/>
        </svg>
    </div>

    <div class="badge">
        <span class="status-dot"></span> Sin conexión a internet
    </div>

    <h1>No hay conexión</h1>
    <p>
        No se puede alcanzar el servidor en este momento.
        Revisa tu conexión a internet e intenta de nuevo.
    </p>

    <button class="btn" onclick="intentarReconectar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Reintentar conexión
    </button>

    <footer>Gestor de Inventario · modo sin conexión</footer>

    <script>
        function intentarReconectar() {
            const btn = document.querySelector('.btn');
            btn.textContent = 'Verificando…';
            btn.disabled = true;

            fetch('/dashboard', { method: 'HEAD', cache: 'no-store' })
                .then(() => { window.location.href = '/dashboard'; })
                .catch(() => {
                    btn.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        Reintentar conexión`;
                    btn.disabled = false;
                });
        }

        // Auto-reintento cuando la conexión se restaura
        window.addEventListener('online', () => {
            window.location.href = '/dashboard';
        });
    </script>
</body>
</html>
