<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sin conexión — Gestor de Inventario</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root {
            --primary: #007AFF;
            --bg: #F5F5F7;
            --text: #1D1D1F;
            --muted: #6E6E73;
            --border: rgba(0,0,0,.08);
            --surface: #ffffff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #0A84FF;
                --bg: #000000;
                --text: #F5F5F7;
                --muted: #AEAEB2;
                --border: rgba(255,255,255,.09);
                --surface: #1C1C1E;
            }
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .icon-wrap {
            width: 96px; height: 96px; border-radius: 50%;
            background: rgba(0,122,255,.12);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
        }
        svg { width: 48px; height: 48px; }
        h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: .5rem; }
        p  { color: var(--muted); font-size: 1rem; line-height: 1.6; max-width: 380px; margin: 0 auto 2rem; }
        .btn {
            display: inline-flex; align-items: center; gap: .5rem;
            background: var(--primary); color: #fff;
            padding: .75rem 2rem; border-radius: 9999px;
            font-weight: 600; font-size: .95rem;
            border: none; cursor: pointer; text-decoration: none;
            transition: opacity .15s;
        }
        .btn:hover { opacity: .88; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: #ef4444;
            display: inline-block; margin-right: .4rem;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .badge {
            display: inline-flex; align-items: center;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 9999px; padding: .35rem .9rem;
            font-size: .8rem; color: var(--muted); margin-bottom: 1.5rem;
        }
        footer { margin-top: 3rem; color: var(--muted); font-size: .75rem; }
        @keyframes pulse {
            0%, 100% { opacity: 1; } 50% { opacity: .4; }
        }
    </style>
</head>
<body>
    <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#007AFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="1" y1="1" x2="23" y2="23"/>
            <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
            <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
            <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
            <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
            <circle cx="12" cy="20" r="1" fill="#007AFF" stroke="none"/>
        </svg>
    </div>

    <div class="badge">
        <span class="status-dot"></span> Sin conexión a internet
    </div>

    <h1>No hay conexión</h1>
    <p>
        No se puede alcanzar el servidor en este momento.
        Revisa tu conexión a internet e intenta de nuevo.
    </p>

    <button class="btn" onclick="intentarReconectar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        Reintentar conexión
    </button>

    <div id="cachedPages"></div>

    <footer>Gestor de Inventario · modo sin conexión</footer>

    <script>
        // Mostrar páginas disponibles en caché
        (async function() {
            const cached = document.getElementById('cachedPages');
            const CACHE_NAME = 'inventario-v5';
            const PAGINAS = [
                { url: '/dashboard',  label: 'Dashboard' },
                { url: '/gasto/nuevo', label: 'Nuevo Gasto' },
                { url: '/inventario',  label: 'Inventario' },
                { url: '/reportes',    label: 'Reportes' },
            ];
            try {
                const cache = await caches.open(CACHE_NAME);
                const disponibles = [];
                for (const p of PAGINAS) {
                    const hit = await cache.match(p.url);
                    if (hit) disponibles.push(p);
                }
                // También buscar formularios de salida cacheados
                const allKeys = await cache.keys();
                for (const req of allKeys) {
                    const url = new URL(req.url);
                    if (url.pathname === '/salida' && url.searchParams.get('almacen_id')) {
                        disponibles.push({ url: req.url, label: `Registrar Salida` });
                        break;
                    }
                }
                if (disponibles.length > 0) {
                    cached.innerHTML = `
                        <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border);width:100%;max-width:380px;">
                            <p style="color:var(--muted);font-size:.8rem;margin-bottom:.75rem;">
                                Páginas disponibles sin conexión:
                            </p>
                            <div style="display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;">
                                ${disponibles.map(p => `
                                    <a href="${p.url}" style="
                                        background:var(--surface);border:1px solid var(--border);
                                        color:var(--text);border-radius:.5rem;padding:.4rem .9rem;
                                        font-size:.82rem;font-weight:600;text-decoration:none;">
                                        ${p.label}
                                    </a>`).join('')}
                            </div>
                        </div>`;
                }
            } catch {}
        })();

        function intentarReconectar() {
            const btn = document.querySelector('.btn');
            btn.textContent = 'Verificando…';
            btn.disabled = true;

            fetch('/dashboard', { method: 'HEAD', cache: 'no-store' })
                .then(() => { window.location.href = '/dashboard'; })
                .catch(() => {
                    btn.innerHTML = `
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        Reintentar conexión`;
                    btn.disabled = false;
                });
        }

        window.addEventListener('online', () => { window.location.href = '/dashboard'; });
    </script>
</body>
</html>
