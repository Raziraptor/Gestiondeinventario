{% extends 'base.html' %}

{% block title %}{{ titulo }}{% endblock %}

{% block content %}
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('dashboard') }}"><i class="bi bi-grid-fill me-1" style="font-size:.75rem;"></i>Dashboard</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('lista_proveedores') }}">Proveedores</a></li>
            <li class="breadcrumb-item active">{{ titulo }}</li>
        </ol>
    </nav>

    <div class="page-header mb-4">
        <div class="page-header-row">
            <div>
                <h1 class="page-title">{{ titulo }}</h1>
            </div>
        </div>
    </div>

    <form id="formProveedor" method="POST" action="{{ url_for('editar_proveedor', id=proveedor.id) if proveedor else url_for('nuevo_proveedor') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label for="nombre" class="form-label">Nombre del Proveedor</label>
                <input type="text" class="form-control" id="nombre" name="nombre" 
                       value="{{ proveedor.nombre if proveedor else '' }}" required>
            </div>
            <div class="col-md-6">
                <label for="contacto_email" class="form-label">Email de Contacto</label>
                <input type="email" class="form-control" id="contacto_email" name="contacto_email"
                       value="{{ proveedor.contacto_email if proveedor else '' }}">
            </div>
            
            <!-- ======================== -->
            <!-- NUEVO CAMPO DE TELÉFONO -->
            <!-- ======================== -->
            <div class="col-md-6">
                <label for="contacto_telefono" class="form-label">Número de Teléfono</label>
                <input type="tel" class="form-control" id="contacto_telefono" name="contacto_telefono"
                       value="{{ proveedor.contacto_telefono if proveedor else '' }}"
                       placeholder="Ej: +52 81 1234 5678">
            </div>
            <!-- ======================== -->
            
            <div class="col-12 mt-4">
                <button type="submit" class="btn btn-primary">Guardar Proveedor</button>
                <a href="{{ url_for('lista_proveedores') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </div>
    </form>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('formProveedor').addEventListener('submit',function(){const btn=this.querySelector('[type="submit"]');if(btn){btn.disabled=true;btn.innerHTML='<span class="spinner-border spinner-border-sm me-2"></span>Guardando…';}});
</script>
{% endblock %}
