{% extends 'base.html' %}
{% block title %}Error del servidor{% endblock %}
{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height:60vh; padding:3rem 1rem;">
    <div style="font-size:6rem; line-height:1; margin-bottom:1.5rem; opacity:0.15; font-weight:900; letter-spacing:-4px; color:#ef4444;">500</div>
    <div style="font-size:3rem; margin-bottom:1rem;">⚡</div>
    <h2 class="fw-bold mb-2">Error interno del servidor</h2>
    <p class="text-muted mb-4" style="max-width:380px; font-size:0.95rem;">
        Algo salió mal en el servidor. El equipo ha sido notificado. Intenta de nuevo en unos momentos.
    </p>
    <div class="d-flex gap-3 flex-wrap justify-content-center">
        <a href="{{ url_for('index') }}" class="btn btn-primary rounded-pill px-4 shadow-sm fw-bold">
            <i class="bi bi-house me-1"></i> Ir al Inicio
        </a>
        <button onclick="location.reload()" class="btn btn-outline-secondary rounded-pill px-4 fw-bold">
            <i class="bi bi-arrow-clockwise me-1"></i> Reintentar
        </button>
    </div>
</div>
{% endblock %}
